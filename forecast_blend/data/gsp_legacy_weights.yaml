# gsp_merge_weights.yaml
#
# Keys are target GSP IDs (the old/composite ID we want to reconstruct data for).
# Each entry lists the source GSP IDs and weights to combine.
#
# Formula: generation[target, t] = sum(weight_i * generation[source_i, t])
#
# These IDs are no longer present in the PVLive GSP registry but were previously
# used. Rather than skipping them entirely, we reconstruct their generation data
# using weighted combinations of the replacement GSP IDs.
#
# Keys are sourced from the gsp_id column in the legacy database CSV.
# Resolved using pvl._get_gsp_list() on 2026-05-26.

# ACTL_2|CBNK_H|GREE_H|PERI_H|WESA_H (4) -> 350  (20260611)
4:
  pvlive_merge_weights:
    - gsp_id: 350
      weight: 1.0

# BRLE_1|FLEE_1 → BRLE_1 (343) & FLEE_1 (344)  (20251204)
41:
  pvlive_merge_weights:
    - gsp_id: 343  # BRLE_1
      weight: 1.0
    - gsp_id: 344  # FLEE_1
      weight: 1.0

# CARR_1 (56) -> CARR_1|FIDF_1 (351)  (20260611)
56:
  pvlive_merge_weights:
    - gsp_id: 351
      weight: 0.27

# FIDF_1 (122) -> CARR_1|FIDF_1 (351)  (20260611)
122:
  pvlive_merge_weights:
    - gsp_id: 351
      weight: 0.73

